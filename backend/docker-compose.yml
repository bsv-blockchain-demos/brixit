services:
  postgres:
    image: postgres:16-alpine
    container_name: brixit-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: brixit
      POSTGRES_USER: brixit
      POSTGRES_PASSWORD: brixit_dev_password
    volumes:
      - brixit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brixit -d brixit']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  brixit_pgdata:
