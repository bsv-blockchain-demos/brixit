services:
  postgres:
    image: postgres:16-alpine
    container_name: brixit-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: brixit
      POSTGRES_USER: brixit
      POSTGRES_PASSWORD: brixit_dev_password
    volumes:
      - brixit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brixit -d brixit']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brixit-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # These are always the same in the compose network — no need to put in .env.docker
      DATABASE_URL: postgresql://brixit:brixit_dev_password@postgres:5432/brixit
      NODE_ENV: development
      PORT: 3001

volumes:
  brixit_pgdata:
