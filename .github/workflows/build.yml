name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

# Serialize builds of the same commit so a master push and a tag push (e.g. a
# release) don't run concurrently and deadlock on the shared buildx (gha) cache.
# Queue rather than cancel, so both :latest and the version tag get built; the
# second run reuses the now-warm cache and finishes fast.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  get_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Determine deployment tag
        id: deployment_tag
        run: |
          if [[ '${{ github.ref_type }}' == 'tag' ]]; then
            export tag=${{ github.ref_name }}
            echo "version tag is $tag"
            echo "id=$tag" >> $GITHUB_OUTPUT
          else
            export tag=latest
            echo "version tag is $tag"
            echo "id=$tag" >> $GITHUB_OUTPUT
          fi
    outputs:
      deployment_tag: ${{ steps.deployment_tag.outputs.id }}

  build-and-push:
    needs: [ get_tag ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/bsv-blockchain-demos/brixit-frontend:${{ github.sha }}
            ghcr.io/bsv-blockchain-demos/brixit-frontend:${{ needs.get_tag.outputs.deployment_tag }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
            VITE_SERVER_PUBLIC_KEY=${{ secrets.VITE_SERVER_PUBLIC_KEY }}
            VITE_CERT_TYPE=${{ secrets.VITE_CERT_TYPE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/bsv-blockchain-demos/brixit-backend:${{ github.sha }}
            ghcr.io/bsv-blockchain-demos/brixit-backend:${{ needs.get_tag.outputs.deployment_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`ghcr.io/bsv-blockchain-demos/brixit-frontend:${{ needs.get_tag.outputs.deployment_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`ghcr.io/bsv-blockchain-demos/brixit-backend:${{ needs.get_tag.outputs.deployment_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.get_tag.outputs.deployment_tag }}" >> $GITHUB_STEP_SUMMARY
